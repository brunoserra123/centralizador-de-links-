<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links Favoritos</title>
    <meta name="description" content="Gerenciador pessoal de links favoritos com design premium.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Favicon adicionado -->
    <link rel="icon" href="profile_avatar.png" type="image/png">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="container">
        <header>
            <h1>Meus Links</h1>
            <p>Seus sites favoritos, sempre à mão.</p>
            <p style="color: var(--text-secondary); margin-top: 5px; font-size: 0.9rem;">Por Bruno Serra</p>
            <button id="add-link-btn" class="add-link-btn">+ Adicionar Link</button>
        </header>

        <div id="links-grid" class="links-grid">
            <!-- Links serão inseridos aqui pelo JavaScript -->
        </div>
    </main>

    <!-- Modal para adicionar link -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <button id="close-modal-btn" class="close-modal-btn">&times;</button>
            <h2 id="modal-title">Novo Link</h2>
            <form id="add-link-form">
                <input type="hidden" id="link-id" value="">
                <div class="form-group">
                    <label for="link-title">Nome do Site</label>
                    <input type="text" id="link-title" required placeholder="Ex: Google">
                </div>
                <div class="form-group">
                    <label for="link-desc">Descrição</label>
                    <input type="text" id="link-desc" required placeholder="Ex: O melhor buscador">
                </div>
                <div class="form-group">
                    <label for="link-url">URL (Link)</label>
                    <input type="text" id="link-url" required placeholder="Ex: https://google.com">
                </div>
                <div class="form-group">
                    <label>Ícone da Imagem (Opcional)</label>
                    <input type="file" id="link-image" accept="image/*">
                </div>
                <div class="form-group">
                    <label for="link-icon">Ou digite um Emoji</label>
                    <input type="text" id="link-icon" placeholder="Ex: 🔍 (deixe vazio se enviar imagem)">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="submit-btn">Salvar Link</button>
                    <button type="button" id="delete-link-btn" class="delete-btn" style="display: none;">Excluir</button>
                </div>
            </form>
        </div>
    </div>

    <!-- PapaParse para ler CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
